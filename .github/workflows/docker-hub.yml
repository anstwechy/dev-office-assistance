# Build and push Docker images to Docker Hub (pattern aligned with AMLSystem .github/workflows/docker-hub.yml).
#
# Required repo secret: DOCKERHUB_TOKEN — Docker Hub access token.
# Optional repo variable: DOCKERHUB_USERNAME — defaults to anstwechy if unset.
# Optional: DOCKER_VITE_API_BASE_URL — public API origin baked into the web image (browser).

name: Docker Hub — build and push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: dev-office-assistance-api
            context: .
            file: apps/api/Dockerfile
          - image: dev-office-assistance-web
            context: .
            file: apps/web/Dockerfile
            web: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ format('{0}/{1}', vars.DOCKERHUB_USERNAME || 'anstwechy', matrix.image) }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME || 'anstwechy' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILDKIT: "1"
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            ${{ matrix.web == true && format('VITE_API_BASE_URL={0}', vars.DOCKER_VITE_API_BASE_URL || 'http://localhost:4000') || '' }}
          cache-from: type=registry,ref=${{ format('{0}/{1}:latest', vars.DOCKERHUB_USERNAME || 'anstwechy', matrix.image) }}
          cache-to: type=inline,mode=max
