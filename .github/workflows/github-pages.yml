# Static web build to GitHub Pages (Vite / apps/web). Enable: Settings → Pages → Source: GitHub Actions.
#
# Optional repo variable: PAGES_VITE_API_BASE_URL — API origin for the SPA (browser calls). Example: https://api.example.com
# The site base path matches the repository name: /{repo}/

name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web
        run: npm run build -w @office/types && npm run build -w @office/web
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ vars.PAGES_VITE_API_BASE_URL || '' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
