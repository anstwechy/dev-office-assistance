<!doctype html>
<html lang="en" data-app-theme="ember">
  <head>
    <script>
      (function () {
        try {
          var k = "office-app-theme";
          var v = localStorage.getItem(k);
          var t = "ember";
          if (v === "teal" || v === "violet" || v === "ember") t = v;
          document.documentElement.setAttribute("data-app-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-app-theme", "ember");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#dc2626" />
    <meta name="application-name" content="Triage" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Triage" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <title>Office dev triage</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="mask-icon" href="/pwa-icon.svg" color="#dc2626" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
